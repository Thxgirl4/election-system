<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Início - Sistema Eleitoral</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>

     body {
        background-color: #e0e0e0;
        font-family: 'Helvetica', Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
      body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      /* Configuração da imagem */
      background-image: url('/static/css/fundo.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      
      /* Ajuste aqui a transparência (0.1 a 0.9) */
      opacity: 0.4; 
      
      z-index: -1; /* Garante que a imagem fique atrás de tudo */
  }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      font-family: Arial, sans-serif;
    }

    .modal-header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    .modal-body {
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .modal-input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
    }

    .modal-message {
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }

    .modal-message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .modal-message.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }

    .modal-message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }

    .modal-btn-primary {
      background-color: #dc3545;
      color: white;
    }

    .modal-btn-primary:hover {
      background-color: #c82333;
    }

    .modal-btn-secondary {
      background-color: #6c757d;
      color: white;
    }

    .modal-btn-secondary:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Gerenciamento de Dados</h2>
    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
        <button class="btn-enviar" onclick="ir('/candidato')">Candidatos</button>
        <button class="btn-enviar" onclick="ir('/eleitor')">Eleitores</button>
    </div>

    <hr style="border: none; border-top: 1px solid #ccc; margin: 25px 0;">

    <h2>Operação da Eleição</h2>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn-enviar" style="background-color: #ffc107; color: #000; border: 1px solid #d39e00;" onclick="ir('/mesario')">
            1. Abrir Terminal do Mesário
        </button>
        
        <button class="btn-votar" style="margin-top: 0;" onclick="ir('/votacao')">
            2. Abrir Urna Eletrônica
        </button>
        
        <button class="btn-enviar" style="background-color: #dc3545; color: #fff; border: 1px solid #c82333;" onclick="abrirModalEncerramento()">
            3. Encerrar Sessão
        </button>
    </div>
  </div>

  <!-- Modal de Encerramento -->
  <div id="modalEncerramento" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        Encerrar Sessão Eleitoral
      </div>
      <div class="modal-body">
        <div id="mensagemModal" class="modal-message" style="display: none;"></div>
        <input type="text" id="usuarioInput" class="modal-input" placeholder="Usuário do Presidente" />
        <input type="password" id="senhaInput" class="modal-input" placeholder="Senha" />
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" onclick="fecharModalEncerramento()">Cancelar</button>
        <button class="modal-btn modal-btn-primary" onclick="validarEEncerrar()">Encerrar</button>
      </div>
    </div>
  </div>

  <script>
    function ir(rota) { 
        // Abre em uma nova guia se for a Urna ou o Mesário, para facilitar o teste
        if(rota === '/mesario' || rota === '/votacao') {
            window.open(rota, '_blank');
        } else {
            window.location.href = rota; 
        }
    }

    function abrirModalEncerramento() {
      document.getElementById('modalEncerramento').style.display = 'block';
      document.getElementById('usuarioInput').value = '';
      document.getElementById('senhaInput').value = '';
      document.getElementById('mensagemModal').style.display = 'none';
      document.getElementById('usuarioInput').focus();
    }

    function fecharModalEncerramento() {
      document.getElementById('modalEncerramento').style.display = 'none';
      document.getElementById('mensagemModal').style.display = 'none';
    }

    function validarEEncerrar() {
      const usuario = document.getElementById('usuarioInput').value.trim();
      const senha = document.getElementById('senhaInput').value.trim();
      const mensagemDiv = document.getElementById('mensagemModal');

      // Validar campos vazios
      if(!usuario || !senha) {
        mensagemDiv.className = 'modal-message error';
        mensagemDiv.textContent = 'Usuário e senha são obrigatórios!';
        mensagemDiv.style.display = 'block';
        return;
      }

      // Validar horário
      const agora = new Date();
      const hora = agora.getHours();

      if(hora < 17) {
        mensagemDiv.className = 'modal-message warning';
        mensagemDiv.textContent = `Encerramento permitido apenas após as 17h. Hora atual: ${hora}h`;
        mensagemDiv.style.display = 'block';
        return;
      }

      // Validar credenciais
      fetch('/login_presidente', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          usuario: usuario,
          senha: senha
        })
      })
      .then(response => response.json())
      .then(data => {
        if(data.erro) {
          mensagemDiv.className = 'modal-message error';
          mensagemDiv.textContent = 'Usuário ou senha inválidos. Tente novamente!';
          mensagemDiv.style.display = 'block';
          document.getElementById('senhaInput').value = '';
          return;
        }

        // Credenciais válidas e horário correto
        mensagemDiv.className = 'modal-message success';
        mensagemDiv.textContent = `Bem-vindo, ${data.nome_presidente}! Encerrando sessão...`;
        mensagemDiv.style.display = 'block';

        // Aguardar um momento e disparar o encerramento
        setTimeout(() => {
          fetch('/encerrar_sessao', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            }
          })
          .then(response => response.json())
          .then(resultado => {
            setTimeout(() => {
              fecharModalEncerramento();
              alert('Sucesso: ' + resultado.mensagem);
            }, 500);
          })
          .catch(error => {
            console.error('Erro:', error);
            mensagemDiv.className = 'modal-message error';
            mensagemDiv.textContent = 'Erro ao encerrar a sessão!';
            mensagemDiv.style.display = 'block';
          });
        }, 1000);
      })
      .catch(error => {
        console.error('Erro:', error);
        mensagemDiv.className = 'modal-message error';
        mensagemDiv.textContent = 'Erro ao validar credenciais!';
        mensagemDiv.style.display = 'block';
      });
    }

    // Fechar modal ao clicar fora dele
    window.onclick = function(event) {
      const modal = document.getElementById('modalEncerramento');
      if(event.target == modal) {
        fecharModalEncerramento();
      }
    }

    // Permitir encerrar com Enter
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('senhaInput').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
          validarEEncerrar();
        }
      });
    });
  </script>

</body>
</html>
