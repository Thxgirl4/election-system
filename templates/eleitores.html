<!doctype html>
<html lang="pt-BR">
  <head>
    
    <meta charset="UTF-8" />
    <title>Eleitores</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <style>
    body {
        background-color: #e0e0e0;
        font-family: 'Helvetica', Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    
    /* Configuração da imagem */
    background-image: url('/static/fundo.png'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    /* Ajuste aqui a transparência (0.1 a 0.9) */
    opacity: 0.4; 
    
    z-index: -1; /* Garante que a imagem fique atrás de tudo */
} 
  </style>
  <body>
    
    <div class="container">
      <h2>Importar Eleitores</h2>
      <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required accept=".csv" />
        <button type="submit" class="btn-enviar">Enviar</button>
      </form>
      <br /><br />
    </div>

  <div class="container">
    <h2>Importar Eleitores</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required accept=".csv">
      <button type="submit" class="btn-enviar" value=Upload>Enviar</button>
    </form>
    <br><br>
  </div>
    <div class="container">
      <h2>Lista de Eleitores</h2>
      <table>
        <tr>
          <th>Nome</th>
          <th>Título</th>
          <th>Zona</th>
          <th>Seção</th>
        </tr>
        {% for eleitor in eleitores %}
        <tr>
          <td>{{ eleitor.nome }}</td>
          <td>{{ eleitor.titulo }}</td>
          <td>{{ eleitor.zona }}</td>
          <td>{{ eleitor.secao }}</td>
        </tr>
        {% endfor %}
      </table>
    </div>

    <button class="btn-navegacao" onclick="ir('/')">Inicio / Seção</button>

    <script>
      function ir(rota) {
        window.location.href = rota;
      }
    </script>
  </body>
</html>
