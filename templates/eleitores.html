<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Eleitores</title>
  <link rel="stylesheet"  href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <div class="container">
    <h2>Importar Eleitores</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required accept=".csv">
      <button type="submit" class="btn-enviar" value=Upload>Enviar</button>
    </form>
    <br><br>
  </div>

  <div class="container">
    <h2>Lista de Eleitores</h2>
    <table>
      <tr>
        <th>Nome</th>
        <th>Titulo</th>
        <th>Zona</th>
        <th>Secao</th>
      </tr>
      {% for eleitor in eleitores %}
      <tr>
        <td>{{ eleitor.nome }}</td>
        <td>{{ eleitor.titulo }}</td>
        <td>{{ eleitor.zona }}</td>
        <td>{{ eleitor.secao }}</td>
      </tr>
      {% endfor %}
    </table>

  </div>
  
  <button class="btn-navegacao" onclick="ir('/')">Inicio / Seção</button>

  <script>
    function ir(rota) { window.location.href = rota; }
  </script>

</body>
</html>
