<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Eleitores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Importar Eleitores</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required accept=".csv">
      <button type="submit" class="btn-enviar">Enviar</button>
    </form>
    <br><br>
    <button class="btn-votar" onclick="ir('/votacao')">Iniciar Votação</button>
  </div>

  <button class="btn-navegacao" onclick="ir('/candidato')">Ir para Candidatos</button>

  <script>
    function ir(rota) { window.location.href = rota; }
  </script>

</body>
</html>
