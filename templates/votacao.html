<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Votação</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <div class="container">
    <h2>Urna Eletrônica</h2>
    
    <div class="urna">
      <div class="tela">
        <div class="campo-voto">
          <label>Título do Eleitor:</label>
          <input type="text" id="titulo_eleitor" maxlength="12" placeholder="0000 0000 0000">
        </div>
        <hr>
        
        <div class="info-candidato" id="tela-votacao">
          <p>Cargo: <strong id="nome-cargo">Carregando...</strong></p>
          <div class="numero-display" id="display-numeros">
            </div>
          <div id="nome-candidato"></div>
        </div>
        
      </div>

      <div class="teclado">
        <div class="linha">
          <button onclick="inserir(1)">1</button>
          <button onclick="inserir(2)">2</button>
          <button onclick="inserir(3)">3</button>
        </div>
        <div class="linha">
          <button onclick="inserir(4)">4</button>
          <button onclick="inserir(5)">5</button>
          <button onclick="inserir(6)">6</button>
        </div>
        <div class="linha">
          <button onclick="inserir(7)">7</button>
          <button onclick="inserir(8)">8</button>
          <button onclick="inserir(9)">9</button>
        </div>
        <div class="linha">
          <button onclick="inserir(0)">0</button>
        </div>
        <div class="acoes">
          <button class="btn-branco" onclick="votarBranco()">BRANCO</button>
          <button class="btn-corrige" onclick="corrigir()">CORRIGE</button>
          <button class="btn-confirma" onclick="confirmar()">CONFIRMA</button>
        </div>
      </div>
    </div>

    <button class="btn-navegacao" onclick="ir('/')">Voltar ao Início</button>
  </div>

  <script>
    function ir(rota) { window.location.href = rota; }
    
    const etapas = [
      { titulo: 'Governador', digitos: 2 },
      { titulo: 'Presidente', digitos: 2 }
    ];
    
    let etapaAtual = 0; 
    let voto = "";
    let votosSalvos = {};
    window.onload = iniciarEtapa;

    function iniciarEtapa() {
      let etapa = etapas[etapaAtual];
      voto = "";
      
      document.getElementById('nome-cargo').innerText = etapa.titulo;
      
      let htmlNumeros = "";
      for(let i = 0; i < etapa.digitos; i++) {
        htmlNumeros += `<span id="digito${i}">_</span>`;
      }
      document.getElementById('display-numeros').innerHTML = htmlNumeros;
      document.getElementById('nome-candidato').innerText = "";
    }

   function inserir(n) { 
      let etapa = etapas[etapaAtual];
      
      if(voto.length < etapa.digitos) { 
        voto += n; 
        atualizarDisplay(); 
        
        if(voto.length === etapa.digitos) {
            buscarCandidato(voto, etapa.titulo);
        }
      } 
    }

    function buscarCandidato(numeroDigitado, nomeCargo) {
        let divNome = document.getElementById('nome-candidato');
        divNome.innerHTML = "<em>Buscando...</em>"; 
        
        fetch(`/buscar_candidato?numero=${numeroDigitado}&cargo=${nomeCargo}`)
            .then(response => response.json())
            .then(data => {
                if(data.nome === "VOTO NULO") {
                    divNome.innerHTML = `
                        <div style="margin-top: 15px; font-size: 20px;">NÚMERO ERRADO</div>
                        <div style="font-size: 28px; font-weight: bold; margin-top: 5px;">VOTO NULO</div>
                    `;
                } else if(data.nome) {
                    divNome.innerHTML = `
                        <div style="margin-top: 15px;">
                            <strong>Nome:</strong> ${data.nome} <br>
                            <strong>Partido:</strong> ${data.partido}
                        </div>
                    `;
                }
            })
            .catch(err => {
                console.error("Erro na busca:", err);
                divNome.innerHTML = "Erro ao buscar candidato.";
            });
    }

    function corrigir() { 
      voto = ""; 
      document.getElementById('nome-candidato').innerHTML = ""; 
      
      let etapa = etapas[etapaAtual];
      if (document.getElementById('display-numeros').innerText === "VOTO EM BRANCO") {
        iniciarEtapa();
      } else {
        atualizarDisplay(); 
      }
    }

    function atualizarDisplay() {
      let etapa = etapas[etapaAtual];
      for(let i = 0; i < etapa.digitos; i++) {
        let span = document.getElementById(`digito${i}`);
        if(span) span.innerText = voto[i] || "_";
      }
    }

    function votarBranco() { 
      voto = "BRANCO"; 
      document.getElementById('display-numeros').innerHTML = "VOTO EM BRANCO";
    }

    function confirmar() { 
      let etapa = etapas[etapaAtual];
      
      if (voto.length === etapa.digitos || voto === "BRANCO") {
        
        votosSalvos[etapa.titulo] = voto;
        
        etapaAtual++;
        
        if (etapaAtual < etapas.length) {
          iniciarEtapa();
        } else {
          finalizarVotacao();
        }
      } else {
        alert("Preencha todos os dígitos ou vote em BRANCO antes de confirmar.");
      }
    }

   function finalizarVotacao() {
      let tituloEleitor = document.getElementById('titulo_eleitor').value;
      
      if(!tituloEleitor) {
          alert("Por favor, digite o título de eleitor no topo da urna antes de finalizar.");
          return;
      }

      document.getElementById('tela-votacao').innerHTML = `
        <div style="font-size: 40px; text-align: center; margin-top: 40px; font-weight: bold;">FIM</div>
      `;
      
      const payload = {
        eleitor: tituloEleitor,
        votos: votosSalvos
      };
      
      fetch('/votar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
         if(data.erro) {
             alert("Erro: " + data.erro);
         } else {
             console.log(data.mensagem);
             setTimeout(() => ir('/'), 3000);
         }
      })
      .catch(err => console.error("Erro ao computar voto:", err));
    }
  </script>
</body>
</html>
