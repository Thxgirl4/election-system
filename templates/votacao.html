<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Urna Eletrônica</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/votacao.css') }}" />
</head>
<body>

  <div class="container">
    <!-- Botões para gerar PDFs -->
    <div class="botoes-pdf">
      <button class="btn-pdf btn-zeroesima" id="btnZeroesima" onclick="gerarZeroesima()">Zerésima da Urna</button>
      <button class="btn-pdf btn-boletim" id="btnBoletim" onclick="gerarBoletim()">Boletim da Urna</button>
    </div>

    <div class="urna">
      <div class="tela">
        
        <div id="tela-bloqueio">
          AGUARDANDO<br>LIBERAÇÃO
        </div>

        <div id="tela-votacao">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex: 1;">
                <div style="flex: 1;">
                    <div class="cabecalho-tela" id="nome-cargo">Carregando...</div>
                    <div class="numero-display" id="display-numeros"></div>
                    <div id="nome-candidato" class="dados-texto"></div>
                </div>
                
                <div class="foto-container" id="foto-candidato-container" style="display: none;">
                    <img id="foto-candidato" src="" alt="Foto">
                </div>
            </div>
          
            <div class="rodape-tela" id="rodape-instrucoes" style="display: none;">
                Aperte a tecla:<br>
                VERDE para CONFIRMAR<br>
                LARANJA para CORRIGIR
            </div>
        </div>
        
      </div>

      <div class="teclado">
        <div class="linha">
          <button onclick="inserir(1)">1</button>
          <button onclick="inserir(2)">2</button>
          <button onclick="inserir(3)">3</button>
        </div>
        <div class="linha">
          <button onclick="inserir(4)">4</button>
          <button onclick="inserir(5)">5</button>
          <button onclick="inserir(6)">6</button>
        </div>
        <div class="linha">
          <button onclick="inserir(7)">7</button>
          <button onclick="inserir(8)">8</button>
          <button onclick="inserir(9)">9</button>
        </div>
        <div class="linha">
          <button onclick="inserir(0)">0</button>
        </div>
        <div class="acoes">
          <button class="btn-branco" onclick="votarBranco()">BRANCO</button>
          <button class="btn-corrige" onclick="corrigir()">CORRIGE</button>
          <button class="btn-confirma" onclick="confirmar()">CONFIRMA</button>
        </div>
      </div>
    </div>
  </div>

  <script src='static/js/votacao.js'> </script>
</body>
</html>
