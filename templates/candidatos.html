<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Candidatos</title>
  <link rel="stylesheet"  href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <div class="container">
    <h2>Importar Candidatos</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required accept=".csv">
      <button type="submit" class="btn-enviar">Enviar</button>
    </form>
    <br><br>
  </div>

  <div class="container">
    <h2>Lista de Candidatos</h2>
    <table>
      <tr>
        <th>Número</th>
        <th>Nome</th>
        <th>Partido</th>
        <th>Cargo</th>
      </tr>
      {% for candidato in candidatos %}
      <tr>
        <td>{{ candidato.id_candidato }}</td>
        <td>{{ candidato.nome_candidato }}</td>
        <td>{{ candidato.id_partido }}</td>
        <td>{{ candidato.id_cargo }}</td>
      </tr>
      {% endfor %}
    </table>

  </div>


  <button class="btn-navegacao" onclick="ir('/')">Inicio / Seção</button>

  <script>
    function ir(rota) { window.location.href = rota; }
  </script>

</body>
</html>
