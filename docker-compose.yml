version: '3.8'

services:
  app:
    build: .
    container_name: election_app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=election_db
      - SECRET_KEY=your_secret_key_here
    depends_on:
      - db

  db:
    image: postgres:13
    container_name: election_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: election_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data